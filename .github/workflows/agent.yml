name: Tech4Dev LinkedIn Post Agent

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday   7 AM WAT
    - cron: "0 6 * * 3"   # Wednesday 7 AM WAT
    - cron: "0 6 * * 5"   # Friday   7 AM WAT
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10    # Apify scrape takes ~3 min; this gives plenty of room

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LinkedIn Post Agent
        env:
          APIFY_API_TOKEN:  ${{ secrets.APIFY_API_TOKEN }}   # ← NEW: needed for scraping
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL:     ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          LINKEDIN_COMPANY: tech4dev
        run: python scripts/agent.py
